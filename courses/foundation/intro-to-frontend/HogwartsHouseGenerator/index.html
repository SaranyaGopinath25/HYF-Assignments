<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts House Generator</title>
    <link rel="stylesheet" href="style.css"></link>
    <style>
@import url('https://fonts.cdnfonts.com/css/harry-p');
</style>


</head>
<body>
    <header>
        <h1>Hogwarts House Generator</h1>
    </header>
    <main>
        <div class="container">
            <div class="form-section">
                <form id="myForm">
                    <label for="inputName"> <h2>Enter Your Name : </h2></label>
                    <input type="text" id="inputName" placeholder="Your name here..." required>
                    <button type="submit">Get My House</button>
                </form>
            </div>
            <hr>
            <div class="result" id="house">
                <h2 id="houseResult">"You will get your House here"</h2>
                <img src="./assets/HP-house.webp" alt="Hogwarts-House" id="houseImage"/>
            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>
